<!doctype html><html><head><meta charset="utf-8"/>
<style>
  html,body{margin:0;background:#F8FAFC;font-family:ui-sans-serif,sans-serif;}
  #wrap{position:relative;width:100%;height:500px;}
  #cv{width:100%;height:100%;display:block;touch-action:none;cursor:grab;}
  #cv:active{cursor:grabbing;}
  #ctrls{position:absolute;left:14px;bottom:14px;right:14px;display:flex;align-items:center;
    gap:12px;background:rgba(255,255,255,.82);backdrop-filter:blur(6px);border:1px solid #E2E8F0;
    border-radius:10px;padding:8px 12px;font:500 12px 'IBM Plex Mono',ui-monospace,monospace;color:#4E5663;}
  #play{border:1px solid #2E6BDB;background:#2E6BDB;color:#fff;border-radius:7px;padding:5px 12px;cursor:pointer;font:inherit;}
  #play.paused{background:#fff;color:#2E6BDB;}
  #range{flex:1;accent-color:#2E6BDB;}
  .lab{white-space:nowrap;}
  #err{position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px;
    color:#7A828D;font-size:13px;background:#F8FAFC;}
</style></head><body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="ctrls">
    <button id="play" class="paused">&#9654; play depth</button>
    <span class="lab">layer <b id="lnum">0</b></span>
    <input id="range" type="range" min="0" max="11" value="0" step="1"/>
    <span class="lab" style="color:#7A828D;flex:1;">attention flowing inward to token 0 &middot; drag to orbit</span>
  </div>
  <div id="err">Rendering the flow&hellip;</div>
</div>
<script type="importmap">
{ "imports": { "three": "https://esm.sh/three@0.160.0", "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
const DATA = __DATA__;   // {accent, tokens:[...], w:[[per-token attn->token0] per layer]}
const ERR = document.getElementById("err");
try {
  const THREE = await import("three");
  const { OrbitControls } = await import("three/addons/controls/OrbitControls.js");
  const wrap=document.getElementById("wrap"), canvas=document.getElementById("cv");
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(42,1,0.01,500);
  const controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true; controls.dampingFactor=0.08; controls.enablePan=false;
  controls.autoRotate=true; controls.autoRotateSpeed=0.6;
  let _idle=performance.now();
  canvas.addEventListener("pointerdown",()=>{controls.autoRotate=false;_idle=performance.now();});
  canvas.addEventListener("pointermove",()=>{if(!controls.autoRotate)_idle=performance.now();});
  canvas.addEventListener("pointerup",()=>{_idle=performance.now();});
  canvas.addEventListener("wheel",()=>{controls.autoRotate=false;_idle=performance.now();},{passive:true});
  scene.add(new THREE.AmbientLight(0xffffff,1));

  const ACCENT=new THREE.Color(DATA.accent), GREY=new THREE.Color("#9DB3D6");
  const N=DATA.tokens.length;
  // Radial "hub": token 0 at the centre, the rest spaced on a ring (in the XZ
  // plane); ring grows with token count so labels never collide. Arcs bow UP in y.
  const R=Math.max(2.8, 0.55*N);
  const CTR=new THREE.Vector3(0,0,0);
  function nodePos(i){
    if(i===0) return CTR.clone();
    const a=2*Math.PI*(i-1)/Math.max(1,N-1);
    return new THREE.Vector3(Math.cos(a)*R, 0, Math.sin(a)*R);
  }
  function labelSprite(text, color, big){
    const fp=64, c=document.createElement("canvas"), x=c.getContext("2d");
    x.font=`600 ${fp}px 'IBM Plex Mono', monospace`;
    const w=Math.ceil(x.measureText(text).width)+24, h=fp+18;
    c.width=w; c.height=h;
    x.font=`600 ${fp}px 'IBM Plex Mono', monospace`;
    x.fillStyle=color; x.textBaseline="middle"; x.textAlign="center";
    x.fillText(text,w/2,h/2);
    const t=new THREE.CanvasTexture(c); t.anisotropy=4;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false}));
    const s=big?0.011:0.0072; sp.scale.set(s*w, s*h, 1);
    return sp;
  }
  for(let i=0;i<N;i++){
    const p=nodePos(i), first=i===0;
    const node=new THREE.Mesh(new THREE.SphereGeometry(first?0.34:0.10,24,24),
      new THREE.MeshBasicMaterial({color:first?ACCENT:GREY}));
    node.position.copy(p); scene.add(node);
    const lab=labelSprite(DATA.tokens[i]||"∅", first?"#2E6BDB":"#5A6472", first);
    if(first){ lab.position.set(0,0.8,0); }
    else { const d=p.clone().multiplyScalar(1.16); lab.position.set(d.x,0.18,d.z); }
    scene.add(lab);
  }
  // halo ring around token 0 so the sink reads as the hub
  const halo=new THREE.Mesh(new THREE.TorusGeometry(0.55,0.02,8,40),
    new THREE.MeshBasicMaterial({color:ACCENT,transparent:true,opacity:0.5}));
  halo.rotation.x=Math.PI/2; scene.add(halo);

  // one bowed arc per token -> centre, plus 2 dots that flow inward along it
  const arcs=[];
  for(let q=1;q<N;q++){
    const pq=nodePos(q);
    const mid=pq.clone().multiplyScalar(0.5); mid.y=1.4;
    const curve=new THREE.QuadraticBezierCurve3(pq, mid, CTR);
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,32,0.018,8,false),
      new THREE.MeshBasicMaterial({color:ACCENT,transparent:true,opacity:0.08}));
    scene.add(tube);
    const dots=[0,0.5].map(ph=>{
      const d=new THREE.Mesh(new THREE.SphereGeometry(0.07,12,12),
        new THREE.MeshBasicMaterial({color:ACCENT,transparent:true,opacity:0}));
      scene.add(d); return {mesh:d, ph};
    });
    arcs.push({q, curve, tube, dots, w:0});
  }

  let L=0;
  function setLayer(li){
    L=li;
    document.getElementById("lnum").textContent=String(li);
    document.getElementById("range").value=String(li);
    const row=DATA.w[li]||[];
    for(const a of arcs){
      a.w=Math.min(1, row[a.q]||0);
      a.tube.material.opacity = 0.05 + 0.30*a.w;
    }
  }

  let fitted=false;
  function resize(){
    const w=wrap.clientWidth,h=wrap.clientHeight;
    renderer.setSize(w,h,false);
    camera.aspect=w/h; camera.updateProjectionMatrix();
    if(!fitted){
      const vF=camera.fov*Math.PI/180, hF=2*Math.atan(Math.tan(vF/2)*camera.aspect);
      const d=(R*1.25)/Math.tan(Math.min(vF,hF)/2)+1.5;
      camera.position.set(0, d*0.62, d*0.86);
      controls.minDistance=d*0.45; controls.maxDistance=d*2.4; controls.target.set(0,0.2,0);
      controls.update(); fitted=true;
    }
  }
  window.addEventListener("resize",resize); resize();
  setLayer(0);

  const t0=performance.now();
  function loop(){
    requestAnimationFrame(loop);
    const el=(performance.now()-t0)/1000;
    for(const a of arcs){
      for(const dt of a.dots){
        const t=(el*0.30 + dt.ph) % 1;             // flow ring -> centre
        dt.mesh.position.copy(a.curve.getPoint(t));
        dt.mesh.material.opacity = (0.15 + 0.85*a.w) * Math.sin(t*Math.PI);  // fade in/out
      }
    }
    if(!controls.autoRotate && performance.now()-_idle>2500) controls.autoRotate=true;
    controls.update();
    renderer.render(scene,camera);
  }
  loop();
  const range=document.getElementById("range");
  range.max=String(DATA.w.length-1);
  range.addEventListener("input",()=>setLayer(+range.value));
  let timer=null;
  const play=document.getElementById("play");
  play.addEventListener("click",()=>{
    if(timer){clearInterval(timer);timer=null;play.classList.add("paused");play.innerHTML="&#9654; play depth";}
    else{play.classList.remove("paused");play.textContent="❚❚ pause";
      timer=setInterval(()=>setLayer((L+1)%DATA.w.length),800);}
  });
  ERR.style.display="none";
} catch (e) {
  ERR.textContent="3-D view couldn't load here — the heatmap above shows the same pattern.";
  ERR.style.display="grid";
  console.error("flow3d init failed", e);
}
</script></body></html>
